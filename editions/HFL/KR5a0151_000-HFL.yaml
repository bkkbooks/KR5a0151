front:
  text: 修眞太極混元指玄圖
  hash: sha256:660e3d60f9344fdbbf22940514d0d1a75c65e14dae23d066fa771fb4d9068ab4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0151_HFL_000-001a, image: hfl/0068/0068-040.png}
body:
  text: 祕傳胎息訣有五門自然胎息訣第一行之令人棄殼昇仙眞胎息訣第二行之令人長生不死去住分明大胎息訣第三行之安樂延年反老還童而骨健身輕混元胎息訣第四行之令人反老換肌如玉胎息訣第五行之止得去除疾病充悅肌睿右件胎息訣明有時候各有五行無爲中有爲不說存想導引不說避忌觸犯行之旬日見驗玄機奥旨難盡難陳矣眞龍虎交媾内丹訣圖祕傳内丹訣有七門紫金丹訣第一採龍虎内丹六百日火候並足以水火旣濟了足是曰紫金丹紫金丹就當可上昇金丹訣第二採龍虎結内丹次以金液還丹修煉而成金丹火候足六白日全備當可不死龍虎内丹訣第三修煉而成火候止是三百日子足當可長生青金丹訣第四䘵肝眞氣修煉而成紅金丹訣第五採心眞氣修煉而成西華丹訣第六採肺眞氣修練而成太玄丹訣第七採腎眞氣修煉而成右件内丹訣無爲中有爲並不存想導引紫金丹就棄殼昇仙金丹就陸地神仙龍虎丹就長生不死餘有一丹自可返老採之一日而成不說三年九載凡人有丹如龍有珠昇騰自如丹之功也周天火候訣圖祕傳火候有五門五門計六百篇周天時火火候第一以一時奪一年火功周天日火火候第二以一日奪一年火功周天月火火候第三以一月奪一年火功周五氣火火候第四以一氣奪一年火功周天火候第五以一年本數行一年功右件火候煉形則骨健身輕煉精則還童返老煉氣則合就陽神煉神則還眞入道火候數多玄妙難窮火候法多行持不測肘後飛金晶訣圖祕傳肘後術有三門肘後飛金晶訣第一以肺眞氣而曰金晶三關一撞直入泥丸髄滿令人骨健自有反老之功兼以龍虎旣結內丹須要腎氣睹負肺之眞氣抽之於頂中配合神水下降肘後術訣第二此是以腎氣暗負肺之眞氣止過三關上補泥九令人髭鬢復黑皺臉重舒還精補腦訣第三方内術而對境未能無穴當且調煉不令走失還精補腦長生不死右件肘後術是使腎氣不傳五臓背過尾閭穴下關次過夾脊中關次入玉京上關以填髓海如修眞之士旣採龍虎而一日成丹眞胎不可不行此術以抽隂鉛後起是以早得純陽若人不悟眞道不識龍虎交媾止要返老當行此術見効而止還丹訣圖自尾閭穴起一撞三關至泥丸合和神水下降復還丹田曰大還丹自腎傳肝自肝傳心自心傳脾自脾傳肺周而復始再至丹田曰小還丹祕傳還丹訣有六門九轉還丹訣第一以五臓眞氣三田眞氣合和神水下丹曰而曰九轉九轉功就立可素殻昇仙七返還丹訣第二以三隂三陽三返畫夜一循環三田都過而曰七返七返功就立可棄殼昇仙大還丹訣第三以三田返復循環一次而曰大還丹大還丹就不止長生在世而亦昇舉塵骨而曰羽客矣小還丹訣第四以五臓循環一次而曰小還丹小還丹就不止安樂延年而亦長生返老金液還丹訣第五以肺眞氣合頂中神水而曰金液下還丹田自可骨相金色而體出金光玉液還丹訣第六以腎眞氣合心中神水而曰玉液下還丹田自可換血爲膏而身如玉樹右件還丹訣是出而復還本處而曰還丹非漱津咽唾如人無内丹而還丹自可改易肌膚變換容儀如人有内丹而還丹澆灌眞氣早爲純陽自頂中而下入黃庭經曰金液還丹自腎中而復黃庭曰玉液還丹矣錬形祕訣圖祕傅錬形訣有四門太陽鍊形訣第一有内丹以丹中純陽之氣運而錬形百日自可昇飛太隂錬形訣第二以頂中眞神水運而鍊形百日血化爲膏千日肉化爲氣金液鍊形訣第三以肺中眞氣合神水欲還丹而未還之際昇而鍊形體岀如玉樹之貌而目見金宅玉液錬形訣第四以腎真氣而循環五臓欲還未還之際昇而上入四肢變血爲膏肌如玉樹鍊膏如玉自耐寒暑不止澆灌丹田而解其王火而又薰蒸五臓助其所生氣也右件鍊形有四並無異自古上眞不願留形住世皆願棄殻而爲眞人然以鍊形亦爲有訣蓋無其人也三田旣濟訣圖祕傳旣濟訣有二門旣濟訣第一以腎氣暗負肺之眞氣皆飛下關上補泥丸髓海旣實用法致之合和神水下還丹田復以丹中純陽之氣上昇一昇一降陌見於重猛之側而曰旣濟旣濟一次一粒金粟還丹一粒金粟還丹一道金光岀於皮毛之間金光萬道自可棄殻昇仙小旣済訣第二以還丹中起火而曰小旣濟小旣濟一次自可鍊形住世永耐寨暑右件旣濟訣不是漱咽津唾以意送之下田存想心火以意舉之重樓也當其神水下降味甘神爽自然降來當其眞火上昇體熱氣清自然昇起玄機妙旨難以紙筆鍊氣成神朝无訣圖鍊氣成神朝元訣祕傳有六門錬氣成神朝元訣第一以丹中眞氣錬五臓之氣昇而成神上入天宮三花朝元訣第二丹中純陽一花上朝天宮心中眞陽一花上朝夭宫腎中正陽一花上朝天宫鍊肝氣成神訣第三以丹中純陽之氣鍊肝令人目視鬼神錬心氣成神訣第四以丹中純陽之氣鍊心令人心通前事錬肺氣成神訣第五以丹中純陽之氣錬肺令人水耐寒暑錬腎氣成神訣第六以丹中純陽之氣錬腎令人返老還童右件錬氣訣須是有丹而可鍊氣氣眞神自現神現道自得矣若以心火存想徒然而巳如畫地爲餅豈可充飢玄旨難陳祕傳内觀起火訣有七門内觀起火除三尸内觀起火除七魄内觀起火降群魔内觀起火殺五鬼内觀起火下九蟲内觀起火除疾病内觀起火鍊形質又曰焚身右件起火訣須是有内丹而起丹中純陽之氣而曰正眞之火若以心爲君火腎爲臣火膀胱爲民火是爲三昧眞火雖曰眞火昧而不明非此内丹者内觀起火内丹起火鬼神不敢近水火不能害自巳見之炎炎萬丈於火中矣棄殻昇仙入聖超凡訣圖祕傳棄殼訣有一十二門鐘雕道成以七層寳塔出吕公道成以三級紅樓出海蟾子道成以鶴冲天門岀軒轅道成以火龍出施眞人道成以花林出餘有看月駕岀地踴五色雲今者不書録者以僧子坐化道人尸解不下前功上要棄殻定中悟出天門者皆爲鬼仙不能純陽之仙其實鬼也是爲清靈之鬼非爲純陽之仙也修眞太極混元指玄圖
