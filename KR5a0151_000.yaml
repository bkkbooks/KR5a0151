front:
  text: 修真太極混元指玄圖
  hash: sha256:5495f5eb134753621d0077646369a833250e2b46ec59cd3ad6dc5dbeca1da272
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0151_HFL_000-001a, image: hfl/0068/0068-040.png}
body:
  text: 祕傳胎息訣有五門自然胎息訣第一行之令人棄殼升仙真胎息訣第二行之令人長生不死去住分明大胎息訣第三行之安樂延年反老還童而骨健身輕混元胎息訣第四行之令人反老換肌如玉胎息訣第五行之止得去除疾病充悅肌睿右件胎息訣明有時候各有五行無為中有為不説存想導引不説避忌觸犯行之旬日見驗玄機奧旨難盡難陳矣真龍虎交媾內丹訣圖祕傳內丹訣有七門紫金丹訣第一採龍虎內丹六百日火候並足以水火既濟了足是曰紫金丹紫金丹就當可上升金丹訣第二採龍虎結內丹次以金液還丹修煉而成金丹火候足六白日全備當可不死龍虎內丹訣第三修煉而成火候止是三百日子足當可長生青金丹訣第四䘵肝真氣修煉而成紅金丹訣第五採心真氣修煉而成西華丹訣第六採肺真氣修練而成太玄丹訣第七採腎真氣修煉而成右件內丹訣無為中有為並不存想導引紫金丹就棄殼升仙金丹就陸地神仙龍虎丹就長生不死餘有一丹自可返老採之一日而成不説三年九載凡人有丹如龍有珠升騰自如丹之功也周天火候訣圖祕傳火候有五門五門計六百篇周天時火火候第一以一時奪一年火功周天日火火候第二以一日奪一年火功周天月火火候第三以一月奪一年火功周五氣火火候第四以一氣奪一年火功周天火候第五以一年本數行一年功右件火候煉形則骨健身輕煉精則還童返老煉氣則合就陽神煉神則還真入道火候數多玄妙難窮火候法多行持不測肘後飛金晶訣圖祕傳肘後術有三門肘後飛金晶訣第一以肺真氣而曰金晶三關一撞直入泥丸髓滿令人骨健自有反老之功兼以龍虎既結內丹須要腎氣睹負肺之真氣抽之於頂中配合神水下降肘後術訣第二此是以腎氣暗負肺之真氣止過三關上補泥九令人髭鬢復黑皺臉重舒還精補腦訣第三方內術而對境未能無穴當且調煉不令走失還精補腦長生不死右件肘後術是使腎氣不傳五臟背過尾閭穴下關次過夾脊中關次入玉京上關以填髓海如修真之士既採龍虎而一日成丹真胎不可不行此術以抽隂鉛後起是以早得純陽若人不悟真道不識龍虎交媾止要返老當行此術見效而止還丹訣圖自尾閭穴起一撞三關至泥丸合和神水下降復還丹田曰大還丹自腎傳肝自肝傳心自心傳脾自脾傳肺周而復始再至丹田曰小還丹祕傳還丹訣有六門九轉還丹訣第一以五臟真氣三田真氣合和神水下丹曰而曰九轉九轉功就立可素殼升仙七返還丹訣第二以三隂三陽三返畫夜一循環三田都過而曰七返七返功就立可棄殼升仙大還丹訣第三以三田返復循環一次而曰大還丹大還丹就不止長生在世而亦升舉塵骨而曰羽客矣小還丹訣第四以五臟循環一次而曰小還丹小還丹就不止安樂延年而亦長生返老金液還丹訣第五以肺真氣合頂中神水而曰金液下還丹田自可骨相金色而體出金光玉液還丹訣第六以腎真氣合心中神水而曰玉液下還丹田自可換血為膏而身如玉樹右件還丹訣是出而復還本處而曰還丹非漱津咽唾如人無內丹而還丹自可改易肌膚變換容儀如人有內丹而還丹澆灌真氣早為純陽自頂中而下入黃庭經曰金液還丹自腎中而復黃庭曰玉液還丹矣錬形祕訣圖祕傅錬形訣有四門太陽鍊形訣第一有內丹以丹中純陽之氣運而錬形百日自可升飛太隂錬形訣第二以頂中真神水運而鍊形百日血化為膏千日肉化為氣金液鍊形訣第三以肺中真氣合神水欲還丹而未還之際升而鍊形體出如玉樹之貌而目見金宅玉液錬形訣第四以腎真氣而循環五臟欲還未還之際升而上入四肢變血為膏肌如玉樹鍊膏如玉自耐寒暑不止澆灌丹田而解其王火而又薰蒸五臟助其所生氣也右件鍊形有四並無異自古上真不願留形住世皆願棄殼而為真人然以鍊形亦為有訣蓋無其人也三田既濟訣圖祕傳既濟訣有二門既濟訣第一以腎氣暗負肺之真氣皆飛下關上補泥丸髓海既實用法致之合和神水下還丹田復以丹中純陽之氣上升一升一降陌見於重猛之側而曰既濟既濟一次一粒金粟還丹一粒金粟還丹一道金光出於皮毛之間金光萬道自可棄殼升仙小既濟訣第二以還丹中起火而曰小既濟小既濟一次自可鍊形住世永耐寨暑右件既濟訣不是漱咽津唾以意送之下田存想心火以意舉之重樓也當其神水下降味甘神爽自然降來當其真火上升體熱氣清自然升起玄機妙旨難以紙筆鍊氣成神朝無訣圖鍊氣成神朝元訣祕傳有六門錬氣成神朝元訣第一以丹中真氣錬五臟之氣升而成神上入天宮三花朝元訣第二丹中純陽一花上朝天宮心中真陽一花上朝夭宫腎中正陽一花上朝天宫鍊肝氣成神訣第三以丹中純陽之氣鍊肝令人目視鬼神錬心氣成神訣第四以丹中純陽之氣鍊心令人心通前事錬肺氣成神訣第五以丹中純陽之氣錬肺令人水耐寒暑錬腎氣成神訣第六以丹中純陽之氣錬腎令人返老還童右件錬氣訣須是有丹而可鍊氣氣真神自現神現道自得矣若以心火存想徒然而巳如畫地為餅豈可充飢玄旨難陳祕傳內觀起火訣有七門內觀起火除三尸內觀起火除七魄內觀起火降群魔內觀起火殺五鬼內觀起火下九蟲內觀起火除疾病內觀起火鍊形質又曰焚身右件起火訣須是有內丹而起丹中純陽之氣而曰正真之火若以心為君火腎為臣火膀胱為民火是為三昧真火雖曰真火昧而不明非此內丹者內觀起火內丹起火鬼神不敢近水火不能害自巳見之炎炎萬丈於火中矣棄殼升仙入聖超凡訣圖祕傳棄殼訣有一十二門鐘雕道成以七層寶塔出吕公道成以三級紅樓出海蟾子道成以鶴沖天門出軒轅道成以火龍出施真人道成以花林出餘有看月駕出地踴五色雲今者不書録者以僧子坐化道人尸解不下前功上要棄殼定中悟出天門者皆為鬼仙不能純陽之仙其實鬼也是為清靈之鬼非為純陽之仙也修真太極混元指玄圖
